# ============================================================
# Saldo — Docker Compose
#
# Three services, one command: `docker compose up`.
#   - frontend    nginx serving the built bundle, proxies /api -> backend
#   - backend     uvicorn running FastAPI
#   - cloudflared the Cloudflare Tunnel (sole public ingress on a real deploy)
#
# A named volume (saldo-data) holds the SQLite file so it survives rebuilds.
# Copy .env.example to .env before running.
#
# Optional 4th service `mailpit` (profile "dev-mail") is a local SMTP sink for
# testing the password-reset email without any DNS or real mail server — see
# the service definition below. It stays OFF unless you opt in with:
#   docker compose --profile dev-mail up
# ============================================================

services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Keep the DB on the mounted volume regardless of what .env says locally.
      SALDO_DATABASE_URL: sqlite:///./data/saldo.db
    volumes:
      - saldo-data:/app/data
    ports:
      # Exposed for local dev / debugging. Behind Cloudflare Tunnel in prod the
      # tunnel reaches it over the compose network, so this can be removed.
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        # Wait for the backend healthcheck so nginx's first upstream lookup
        # succeeds instead of crash-looping on "host not found in upstream".
        condition: service_healthy
    ports:
      - "8080:80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # With a token set, run the tunnel. With no token (local dev), idle instead
    # of crash-looping so `docker compose up` stays green. The cloudflared image
    # is Debian-based and ships /bin/sh, so this wrapper is safe.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        if [ -n "$$TUNNEL_TOKEN" ]; then
          exec cloudflared tunnel --no-autoupdate run;
        else
          echo "No CLOUDFLARE_TUNNEL_TOKEN set; cloudflared idling (local dev).";
          exec sleep infinity;
        fi
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - frontend
      - backend

  # --- Local email testing (opt-in) -----------------------------------
  # Mailpit is a tiny SMTP server that CAPTURES outbound mail instead of
  # delivering it, and shows every message in a web inbox. It lets you test the
  # password-reset flow end-to-end — see the real rendered email and click the
  # actual reset link — with no domain, no DNS, and nothing leaving the box.
  #
  # It only runs when you ask for it (profile "dev-mail"):
  #   docker compose --profile dev-mail up
  #
  # Then point the backend at it (in .env), and restart the backend:
  #   SALDO_SMTP_HOST=mailpit
  #   SALDO_SMTP_PORT=1025
  #   SALDO_SMTP_STARTTLS=false
  #   SALDO_SMTP_USER=
  #   SALDO_SMTP_PASSWORD=
  # Open the captured inbox at http://localhost:8025
  mailpit:
    image: axllent/mailpit:v1.20
    restart: unless-stopped
    profiles: ["dev-mail"]
    ports:
      - "8025:8025"   # web inbox UI
      - "1025:1025"   # SMTP the backend submits to
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1        # accept whatever creds (or none) the app sends
      MP_SMTP_AUTH_ALLOW_INSECURE: 1    # allow plaintext submission (dev only)

volumes:
  saldo-data:
