# ============================================================
# Stalwart — mail server for Saldo (OPTIONAL, separate stack)
#
# Saldo does NOT need a mail server to run. It only sends one kind of email —
# the password-reset link — and only when SALDO_SMTP_HOST is set. This stack is
# the reference way to provide that SMTP endpoint on a self-hosted deploy (e.g.
# a Raspberry Pi) without renting a third-party email service.
#
# Stalwart is a single Rust binary (one container, ~120 MiB idle, multi-arch
# incl. ARM/Pi), so it stays out of the repo-root `docker-compose.yml` and runs
# on its own:
#
#   cd stalwart
#   docker compose up -d
#   docker compose logs stalwart | grep -i administrator   # first-boot admin pw
#
# Then open http://<host>:8080/login, create the sender account (e.g.
# noreply@your-domain) with an app password, and point the backend at it:
#
#   SALDO_SMTP_HOST=<host running this stack>
#   SALDO_SMTP_PORT=587
#   SALDO_SMTP_USER=noreply@your-domain
#   SALDO_SMTP_PASSWORD=<app password>
#   SALDO_SMTP_FROM=noreply@your-domain
#
# See ./README.md for DNS (SPF/DKIM/DMARC/PTR) and TLS notes.
# ============================================================

services:
  stalwart:
    # Pinned for reproducibility; bump deliberately (see README). The image is
    # multi-arch, so the same tag works on x86-64 and ARM (Raspberry Pi).
    image: stalwartlabs/stalwart:v0.16.11
    container_name: stalwart
    restart: unless-stopped
    hostname: mail.example.com          # match HOSTNAME in the config / your DNS
    volumes:
      # Single path holds config (etc/config.toml), data, and DKIM keys.
      - ./data:/opt/stalwart
    ports:
      - "25:25"       # inbound/outbound SMTP
      - "465:465"     # submission over implicit TLS
      - "587:587"     # submission over STARTTLS (what Saldo uses)
      - "143:143"     # IMAP STARTTLS
      - "993:993"     # IMAP implicit TLS
      - "8080:8080"   # web admin UI (put behind a reverse proxy / VPN in prod)
      - "443:443"     # HTTPS (admin + JMAP over TLS)
      - "4190:4190"   # ManageSieve (optional; server-side filters)
    # Sensible defaults for a small self-hosted box; Stalwart is frugal.
    ulimits:
      nofile:
        soft: 8192
        hard: 8192
