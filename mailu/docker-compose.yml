# ============================================================
# Mailu — mail server for Saldo (OPTIONAL, separate stack)
#
# Saldo does NOT need a mail server to run. It only sends one kind of email —
# the password-reset link — and only when SALDO_SMTP_HOST is set. This stack is
# the reference way to provide that SMTP endpoint on a self-hosted deploy (e.g.
# a Raspberry Pi) without renting a third-party email service.
#
# Run it *separately* from the main app so `docker compose up` at the repo root
# stays light:
#
#   cd mailu
#   cp mailu.env.example mailu.env      # then edit the values
#   docker compose up -d
#
# After boot, create the sender mailbox (e.g. noreply@your-domain) and an app
# password in the admin UI, then point the backend at it:
#
#   SALDO_SMTP_HOST=<host running this stack>
#   SALDO_SMTP_PORT=587
#   SALDO_SMTP_USER=noreply@your-domain
#   SALDO_SMTP_PASSWORD=<app password>
#   SALDO_SMTP_FROM=noreply@your-domain
#
# See ./README.md for DNS (SPF/DKIM/DMARC) and TLS notes. This file is a
# trimmed Mailu setup; regenerate a fresh one for your domain at
# https://setup.mailu.io if you need webmail/antivirus/OIDC.
# ============================================================

x-environment: &default-environment
  env_file: mailu.env

services:
  # Reverse proxy + TLS termination; the only service that binds host ports.
  front:
    image: ghcr.io/mailu/nginx:2024.06
    restart: unless-stopped
    <<: *default-environment
    ports:
      - "25:25"     # inbound/outbound SMTP
      - "465:465"   # submission over implicit TLS
      - "587:587"   # submission over STARTTLS (what Saldo uses)
      - "143:143"   # IMAP STARTTLS
      - "993:993"   # IMAP implicit TLS
      - "80:80"     # ACME http-01 challenge / admin redirect
      - "443:443"   # admin UI
    volumes:
      - "./data/certs:/certs"
      - "./data/overrides/nginx:/overrides:ro"
    depends_on:
      - resolver
    dns:
      - 192.168.203.254

  resolver:
    image: ghcr.io/mailu/unbound:2024.06
    restart: unless-stopped
    <<: *default-environment
    networks:
      default:
        ipv4_address: 192.168.203.254

  admin:
    image: ghcr.io/mailu/admin:2024.06
    restart: unless-stopped
    <<: *default-environment
    volumes:
      - "./data/data:/data"
      - "./data/dkim:/dkim"
    depends_on:
      - redis
      - resolver
    dns:
      - 192.168.203.254

  imap:
    image: ghcr.io/mailu/dovecot:2024.06
    restart: unless-stopped
    <<: *default-environment
    volumes:
      - "./data/mail:/mail"
      - "./data/overrides/dovecot:/overrides:ro"
    depends_on:
      - front
    dns:
      - 192.168.203.254

  smtp:
    image: ghcr.io/mailu/postfix:2024.06
    restart: unless-stopped
    <<: *default-environment
    volumes:
      - "./data/mailqueue:/queue"
      - "./data/overrides/postfix:/overrides:ro"
    depends_on:
      - front
    dns:
      - 192.168.203.254

  antispam:
    image: ghcr.io/mailu/rspamd:2024.06
    restart: unless-stopped
    <<: *default-environment
    volumes:
      - "./data/filter:/var/lib/rspamd"
      - "./data/overrides/rspamd:/overrides:ro"
    depends_on:
      - front
      - resolver
    dns:
      - 192.168.203.254

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - "./data/redis:/data"

networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.203.0/24
