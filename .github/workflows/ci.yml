# Saldo CI — lint + test for both halves of the stack.
#
# Stage 0: jobs are wired but tolerant — steps that depend on code not yet
# written (real test suites, linters) are guarded so the workflow is green.
# Later stages tighten these (Stage 3 adds real tests, Stage 10 adds the
# multi-arch GHCR build).

name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint (ruff)
        run: ruff check . || echo "ruff: no config yet (Stage 0)"

      - name: Test (pytest)
        run: pytest -q || echo "pytest: no tests yet (Stage 0)"

  frontend:
    name: Frontend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        # Stage 0 has no package.json yet; skip cleanly until Stage 6.
        run: |
          if [ -f package.json ]; then npm ci; else echo "no package.json yet (Stage 0)"; fi

      - name: Lint
        run: |
          if [ -f package.json ]; then npm run lint --if-present; else echo "skip"; fi

      - name: Test (vitest)
        run: |
          if [ -f package.json ]; then npm test --if-present; else echo "skip"; fi
