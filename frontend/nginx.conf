# nginx config for the Saldo frontend container.
# Serves the static bundle and proxies /api to the backend service so the
# browser only ever talks to one origin (important once behind Cloudflare Tunnel).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown routes serve index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service (Docker Compose DNS name: backend).
    #
    # Resolve `backend` at request time via Docker's embedded DNS (127.0.0.11)
    # rather than at startup. A static upstream makes nginx refuse to start with
    # "host not found in upstream" whenever the backend isn't up yet; with a
    # variable + resolver, nginx boots fine and simply returns 502 until the
    # backend is reachable. Because proxy_pass uses a variable, nginx no longer
    # rewrites the URI automatically, so strip the /api/ prefix ourselves.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $backend_upstream backend;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$backend_upstream:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
